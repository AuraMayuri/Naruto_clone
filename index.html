<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clone Split Anime Stack</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>

<style>
body{margin:0;overflow:hidden;background:black;}
video,canvas{
 position:absolute;
 width:100vw;
 height:100vh;
 object-fit:cover;
}
#log{
 position:absolute;
 top:10px;
 left:10px;
 color:#00ff88;
 background:rgba(0,0,0,0.6);
 padding:8px;
 font-size:13px;
 font-family:monospace;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="log"></div>

<script>

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const logDiv=document.getElementById("log");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let mode="idle";
let distanceLog=0;
let frozenBackground=null;
let personImage=null;
let smoke=[];
let finished=false;

// ===== ปรับได้ =====
let cloneCount=12;      // จำนวนต่อข้าง
let spacing=70;        // ระยะห่าง
let revealIndex=0;     // จำนวนที่แสดงแล้ว
let revealSpeed=4;     // ยิ่งน้อยยิ่งช้า (เฟรมต่อการเพิ่ม 1 ตัว)
let frameCounter=0;

// ===== กล้อง =====
navigator.mediaDevices.getUserMedia({video:true})
.then(s=>video.srcObject=s);

// ===== Hands =====
const hands=new Hands({
 locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
hands.setOptions({
 maxNumHands:2,
 modelComplexity:0,
 minDetectionConfidence:0.7,
 minTrackingConfidence:0.7
});

hands.onResults(res=>{

 if(mode==="idle"){
   ctx.clearRect(0,0,canvas.width,canvas.height);
   ctx.drawImage(video,0,0,canvas.width,canvas.height);
 }

 if(res.multiHandLandmarks && mode==="idle"){

   for(const landmarks of res.multiHandLandmarks){
     drawConnectors(ctx,landmarks,HAND_CONNECTIONS,
       {color:"#00FF00",lineWidth:3});
     drawLandmarks(ctx,landmarks,
       {color:"#FF0000",lineWidth:2});
   }

   if(res.multiHandLandmarks.length===2){
     const h1=res.multiHandLandmarks[0][8];
     const h2=res.multiHandLandmarks[1][8];
     const dx=h1.x-h2.x;
     const dy=h1.y-h2.y;
     distanceLog=Math.sqrt(dx*dx+dy*dy);

     if(distanceLog<0.05){
       triggerCapture();
     }
   }
 }

 updateLog();
});

// ===== Segmentation =====
const segmenter=new SelfieSegmentation({
 locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`
});
segmenter.setOptions({modelSelection:1});

segmenter.onResults(results=>{

 if(mode!=="capture") return;

 frozenBackground=document.createElement("canvas");
 frozenBackground.width=canvas.width;
 frozenBackground.height=canvas.height;
 frozenBackground.getContext("2d")
  .drawImage(video,0,0,canvas.width,canvas.height);

 const maskCanvas=document.createElement("canvas");
 maskCanvas.width=canvas.width;
 maskCanvas.height=canvas.height;
 maskCanvas.getContext("2d")
  .drawImage(results.segmentationMask,
    0,0,canvas.width,canvas.height);

 const temp=document.createElement("canvas");
 temp.width=canvas.width;
 temp.height=canvas.height;
 const t=temp.getContext("2d");

 t.drawImage(video,0,0,temp.width,temp.height);
 t.globalCompositeOperation="destination-in";
 t.drawImage(maskCanvas,0,0,temp.width,temp.height);

 personImage=temp;

 mode="split";
});

// ===== Trigger =====
function triggerCapture(){

 if(finished) return;

 mode="capture";

 for(let i=0;i<50;i++){
   smoke.push({
     x:canvas.width/2,
     y:canvas.height/2,
     size:20+Math.random()*30,
     alpha:1,
     vx:(Math.random()-0.5)*6,
     vy:(Math.random()-0.5)*6
   });
 }

 setTimeout(()=>{
   segmenter.send({image:video});
 },400);
}

// ===== Animation =====
function animate(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(frozenBackground){
   ctx.drawImage(frozenBackground,0,0);
 }

 // smoke
 for(let i=smoke.length-1;i>=0;i--){
   let p=smoke[i];
   p.x+=p.vx;
   p.y+=p.vy;
   p.alpha-=0.03;

   ctx.beginPath();
   ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
   ctx.fillStyle="rgba(200,200,200,"+p.alpha+")";
   ctx.fill();

   if(p.alpha<=0) smoke.splice(i,1);
 }

 // ===== Anime Frame Stack =====
 if(mode==="split" && personImage){

   frameCounter++;

   if(frameCounter % revealSpeed === 0 &&
      revealIndex < cloneCount){
      revealIndex++;
   }

   // ซ้าย ขวา ทีละตัว
   for(let i=1;i<=revealIndex;i++){

     ctx.globalAlpha=1; // ไม่จาง

     ctx.drawImage(personImage,
       -spacing*i,0,
       canvas.width,canvas.height);

     ctx.drawImage(personImage,
       spacing*i,0,
       canvas.width,canvas.height);
   }

   // ตัวกลางทับสุดท้าย
   ctx.drawImage(personImage,0,0,
     canvas.width,canvas.height);

   if(revealIndex>=cloneCount){
     finished=true;
   }
 }

 requestAnimationFrame(animate);
}
animate();

function updateLog(){
 logDiv.innerHTML=
 "MODE: "+mode+"<br>"+
 "DISTANCE: "+distanceLog.toFixed(4)+"<br>"+
 "SMOKE: "+smoke.length+"<br>"+
 "REVEAL: "+revealIndex+"/"+cloneCount;
}

function loop(){
 if(!finished)
   hands.send({image:video});
 requestAnimationFrame(loop);
}
video.addEventListener("loadeddata",loop);

</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clone Split Depth</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>

<style>
body{margin:0;overflow:hidden;background:black;}
video,canvas{
 position:absolute;
 width:100vw;
 height:100vh;
 object-fit:cover;
}
#log{
 position:absolute;
 top:10px;
 left:10px;
 color:#00ff88;
 background:rgba(0,0,0,0.6);
 padding:8px;
 font-size:13px;
 font-family:monospace;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="log"></div>

<script>

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const logDiv=document.getElementById("log");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let mode="idle";
let frozenBackground=null;
let personImage=null;
let smoke=[];
let finished=false;

let cloneCount=7;     // ต่อข้าง
let backCount=3;      // ด้านหลัง
let revealIndex=0;
let revealSpeed=4;
let frameCounter=0;

let safeSpacing=60;   // จะคำนวณใหม่หลัง capture

navigator.mediaDevices.getUserMedia({video:true})
.then(s=>video.srcObject=s);

const hands=new Hands({
 locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
hands.setOptions({
 maxNumHands:2,
 modelComplexity:0,
 minDetectionConfidence:0.7,
 minTrackingConfidence:0.7
});

hands.onResults(res=>{

 if(mode==="idle"){
   ctx.clearRect(0,0,canvas.width,canvas.height);
   ctx.drawImage(video,0,0,canvas.width,canvas.height);
 }

 if(res.multiHandLandmarks && mode==="idle"){
   for(const landmarks of res.multiHandLandmarks){
     drawConnectors(ctx,landmarks,HAND_CONNECTIONS,
       {color:"#00FF00",lineWidth:3});
     drawLandmarks(ctx,landmarks,
       {color:"#FF0000",lineWidth:2});
   }

   if(res.multiHandLandmarks.length===2){
     const h1=res.multiHandLandmarks[0][8];
     const h2=res.multiHandLandmarks[1][8];
     const dx=h1.x-h2.x;
     const dy=h1.y-h2.y;
     const dist=Math.sqrt(dx*dx+dy*dy);

     if(dist<0.05){
       triggerCapture();
     }
   }
 }

 updateLog();
});

const segmenter=new SelfieSegmentation({
 locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`
});
segmenter.setOptions({modelSelection:1});

segmenter.onResults(results=>{

 if(mode!=="capture") return;

 frozenBackground=document.createElement("canvas");
 frozenBackground.width=canvas.width;
 frozenBackground.height=canvas.height;
 frozenBackground.getContext("2d")
  .drawImage(video,0,0,canvas.width,canvas.height);

 const maskCanvas=document.createElement("canvas");
 maskCanvas.width=canvas.width;
 maskCanvas.height=canvas.height;
 maskCanvas.getContext("2d")
  .drawImage(results.segmentationMask,
    0,0,canvas.width,canvas.height);

 const temp=document.createElement("canvas");
 temp.width=canvas.width;
 temp.height=canvas.height;
 const t=temp.getContext("2d");

 t.drawImage(video,0,0,temp.width,temp.height);
 t.globalCompositeOperation="destination-in";
 t.drawImage(maskCanvas,0,0,temp.width,temp.height);

 personImage=temp;

 // คำนวณ spacing ให้ไม่หลุดเฟรม
 safeSpacing = (canvas.width/2) / (cloneCount+1);

 mode="split";
});

function triggerCapture(){

 if(finished) return;

 mode="capture";

 for(let i=0;i<50;i++){
   smoke.push({
     x:canvas.width/2,
     y:canvas.height/2,
     size:20+Math.random()*30,
     alpha:1,
     vx:(Math.random()-0.5)*6,
     vy:(Math.random()-0.5)*6
   });
 }

 setTimeout(()=>{
   segmenter.send({image:video});
 },400);
}

function animate(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(frozenBackground){
   ctx.drawImage(frozenBackground,0,0);
 }

 // smoke
 for(let i=smoke.length-1;i>=0;i--){
   let p=smoke[i];
   p.x+=p.vx;
   p.y+=p.vy;
   p.alpha-=0.03;

   ctx.beginPath();
   ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
   ctx.fillStyle="rgba(200,200,200,"+p.alpha+")";
   ctx.fill();

   if(p.alpha<=0) smoke.splice(i,1);
 }

 if(mode==="split" && personImage){

   frameCounter++;

   if(frameCounter % revealSpeed === 0 &&
      revealIndex < cloneCount){
      revealIndex++;
   }

   // ===== ด้านหลัง =====
   for(let i=1;i<=backCount;i++){
     let scale=1-(i*0.08);
     let yOffset=i*40;

     ctx.save();
     ctx.translate(canvas.width/2,canvas.height/2+yOffset);
     ctx.scale(scale,scale);
     ctx.drawImage(personImage,
       -canvas.width/2,
       -canvas.height/2,
       canvas.width,
       canvas.height);
     ctx.restore();
   }

   // ===== ซ้าย ขวา =====
   for(let i=1;i<=revealIndex;i++){

     let x = safeSpacing*i;

     ctx.drawImage(personImage,
       -x,0,
       canvas.width,canvas.height);

     ctx.drawImage(personImage,
       x,0,
       canvas.width,canvas.height);
   }

   // ===== ตัวกลาง =====
   ctx.drawImage(personImage,0,0,
     canvas.width,canvas.height);

   if(revealIndex>=cloneCount){
     finished=true;
   }
 }

 requestAnimationFrame(animate);
}
animate();

function updateLog(){
 logDiv.innerHTML=
 "MODE: "+mode+"<br>"+
 "REVEAL: "+revealIndex+"/"+cloneCount+"<br>"+
 "SMOKE: "+smoke.length+"<br>"+
 "SPACING: "+safeSpacing.toFixed(1);
}

function loop(){
 if(!finished)
   hands.send({image:video});
 requestAnimationFrame(loop);
}
video.addEventListener("loadeddata",loop);

</script>
</body>
</html>
